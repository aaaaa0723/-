<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你從桃園新竹</title>
    <style>
        /* ================= 基礎設定 ================= */
        body {
            margin: 0;
            padding: 0;
            background-color: #F5EAE0; /* 淺奶茶色背景 */
            font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif;
            color: #5C4A3D; /* 深焙咖啡色字體 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 將整體內容上移，達成「中間偏上一點」 */
        .container {
            transform: translateY(-15%);
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        /* ================= 頁面切換動畫 ================= */
        .view {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }
        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= 標題與版面設計 ================= */
        .title {
            font-size: 24px;
            margin-bottom: 24px;
            letter-spacing: 2px;
            text-align: center;
            color: #4A3A2F;
        }

        .menu-box {
            background: #FFFFFF;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(92, 74, 61, 0.08);
            overflow: hidden;
        }

        /* ================= 按鈕共用樣式 ================= */
        .nav-btn {
            width: 100%;
            background: none;
            border: none;
            padding: 20px;
            font-size: 17px;
            font-weight: bold;
            color: #5C4A3D;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #EFE5D8;
            transition: all 0.3s ease;
        }
        .nav-btn:last-child { border-bottom: none; }
        .nav-btn:hover {
            background-color: #FAF4EE;
            padding-left: 25px; /* 滑鼠移入時稍微往右退，增加動態感 */
        }
        .arrow-right { color: #A67B5B; }

        /* 子分類按鈕微調一點層次感 */
        .sub-btn {
            font-size: 16px;
            background-color: #FCFBF9;
        }
        .sub-btn:hover {
            background-color: #F5EAE0;
        }

        /* ================= 子頁面頂部 (返回按鈕) ================= */
        .sub-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #EFE5D8;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            color: #A67B5B;
            cursor: pointer;
            transition: 0.3s;
            margin-right: 15px;
        }
        .back-btn:hover {
            background: #FFFFFF;
            color: #D35400;
        }
        .view-title {
            font-size: 20px;
            font-weight: bold;
            color: #4A3A2F;
            margin: 0;
            letter-spacing: 1px;
        }

        /* ================= 內容切換區塊 ================= */
        .content-group { display: none; } /* 隱藏非當前分類的內容 */
        .content-group.active { display: block; }

        /* ================= 第三層：地點連結 ================= */
        .location-link {
            display: block;
            padding: 18px 20px 18px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #A67B5B; 
            text-decoration: none;
            background-color: #FFFFFF;
            text-align: left;
            transition: all 0.3s ease;
            border-bottom: 1px solid #F5EAE0;
        }
        .location-link:last-child { border-bottom: none; }
        .location-link:hover {
            color: #D35400; 
            background-color: #FFF2E6;
            padding-left: 25px; 
        }

    </style>
</head>
<body>

<div class="container">
    
    <!-- ================= 視圖一：主分類首頁 ================= -->
    <div id="main-view" class="view active">
        <div class="menu-box">
            <button class="nav-btn" onclick="goToCategory('cat1', '日常美食')">
                分類 1：日常美食 <span class="arrow-right">➔</span>
            </button>
            <button class="nav-btn" onclick="goToCategory('cat2', '走跳市區')">
                分類 2：走跳市區 <span class="arrow-right">➔</span>
            </button>
            <button class="nav-btn" onclick="goToCategory('cat3', '關西特輯')">
                分類 3：關西特輯 <span class="arrow-right">➔</span>
            </button>
        </div>
    </div>

    <!-- ================= 視圖二：子分類選單 ================= -->
    <div id="sub-view" class="view">
        <div class="sub-header">
            <button class="back-btn" onclick="goBackToMain()">← 返回分類</button>
            <h2 id="sub-title" class="view-title">分類名稱</h2>
        </div>
        
        <div class="menu-box">
            
            <!-- 分類 1 的子分類 -->
            <div id="cat1" class="content-group">
                <button class="nav-btn sub-btn" onclick="goToLocation('cat1-sub1', '火鍋愛好者')">
                    火鍋愛好者 <span class="arrow-right">➔</span>
                </button>
                <button class="nav-btn sub-btn" onclick="goToLocation('cat1-sub2', '平價小吃')">
                    平價小吃 <span class="arrow-right">➔</span>
                </button>
            </div>

            <!-- 分類 2 的子分類 -->
            <div id="cat2" class="content-group">
                <button class="nav-btn sub-btn" onclick="goToLocation('cat2-sub1', '文藝青年')">
                    文藝青年 <span class="arrow-right">➔</span>
                </button>
                <button class="nav-btn sub-btn" onclick="goToLocation('cat2-sub2', '交通樞紐')">
                    交通樞紐 <span class="arrow-right">➔</span>
                </button>
            </div>

            <!-- 分類 3 的子分類 -->
            <div id="cat3" class="content-group">
                <button class="nav-btn sub-btn" onclick="goToLocation('cat3-sub1', '大阪必去')">
                    大阪必去 <span class="arrow-right">➔</span>
                </button>
                <button class="nav-btn sub-btn" onclick="goToLocation('cat3-sub2', '神戶風情')">
                    神戶風情 <span class="arrow-right">➔</span>
                </button>
            </div>

        </div>
    </div>

    <!-- ================= 視圖三：地點列表 ================= -->
    <div id="location-view" class="view">
        <div class="sub-header">
            <button class="back-btn" onclick="goBackToSub()">← 返回上一層</button>
            <h2 id="loc-title" class="view-title">子分類名稱</h2>
        </div>
        
        <div class="menu-box">
            
            <!-- 分類 1 的地點 -->
            <div id="cat1-sub1" class="content-group">
                <a class="location-link" href="https://www.google.com/maps/dir/?api=1&destination=萬客什鍋" target="_blank">📍 萬客什鍋</a>
                <a class="location-link" href="https://www.google.com/maps/dir/?api=1&destination=築間幸福鍋物" target="_blank">📍 築間幸福鍋物</a>
            </div>
            <div id="cat1-sub2" class="content-group">
                <a class="location-link" href="https://www.google.com/maps/dir/?api=1&destination=六鮮新世界" target="_blank">📍 六鮮新世界</a>
            </div>

            <!-- 分類 2 的地點 -->
            <div id="cat2-sub1" class="content-group">
                <a class="location-link" href="https://www.google.com/maps/dir/?api=1&destination=台中國家歌劇院" target="_blank">📍 台中國家歌劇院</a>
            </div>
            <div id="cat2-sub2" class="content-group">
                <a class="location-link" href="https://www.google.com/maps/dir/?api=1&destination=台中火車站" target="_blank">📍 台中火車站</a>
                <a class="location-link" href="https://www.google.com/maps/dir/?api=1&destination=國立中興大學" target="_blank">📍 國立中興大學</a>
            </div>

            <!-- 分類 3 的地點 -->
            <div id="cat3-sub1" class="content-group">
                <a class="location-link" href="https://www.google.com/maps/dir/?api=1&destination=梅田藍天大廈" target="_blank">📍 梅田藍天大廈</a>
                <a class="location-link" href="https://www.google.com/maps/dir/?api=1&destination=大阪城" target="_blank">📍 大阪城</a>
            </div>
            <div id="cat3-sub2" class="content-group">
                <a class="location-link" href="https://www.google.com/maps/dir/?api=1&destination=神戶港塔" target="_blank">📍 神戶港塔</a>
            </div>

        </div>
    </div>

</div>

<script>
    // ========== 畫面切換邏輯 ==========

    // 1. 從「首頁」進入「子分類頁」
    function goToCategory(catId, catName) {
        // 切換視圖
        hideAllViews();
        document.getElementById('sub-view').classList.add('active');
        
        // 更新標題
        document.getElementById('sub-title').innerText = catName;

        // 顯示對應的子分類內容
        showContentGroup(catId);
    }

    // 2. 從「子分類頁」進入「地點列表頁」
    function goToLocation(locId, locName) {
        // 切換視圖
        hideAllViews();
        document.getElementById('location-view').classList.add('active');
        
        // 更新標題
        document.getElementById('loc-title').innerText = locName;

        // 顯示對應的地點內容
        showContentGroup(locId);
    }

    // 3. 返回上一層 (回到子分類)
    function goBackToSub() {
        hideAllViews();
        document.getElementById('sub-view').classList.add('active');
    }

    // 4. 返回最上層 (回到首頁)
    function goBackToMain() {
        hideAllViews();
        document.getElementById('main-view').classList.add('active');
    }

    // ========== 輔助函數 ==========
    
    // 隱藏所有大畫面
    function hideAllViews() {
        let views = document.querySelectorAll('.view');
        views.forEach(view => view.classList.remove('active'));
    }

    // 隱藏所有清單內容，只顯示目標 ID 的區塊
    function showContentGroup(targetId) {
        let allContents = document.querySelectorAll('.content-group');
        allContents.forEach(content => content.classList.remove('active'));
        document.getElementById(targetId).classList.add('active');
    }
</script>

</body>
</html>
